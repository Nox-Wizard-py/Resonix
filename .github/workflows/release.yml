name: Bump to new version
on:
  push:
    branches:
      - 'main'
    paths:
      - 'app/build.gradle.kts'
  workflow_dispatch:

env:
  LASTFM_API_KEY: ${{ secrets.LASTFM_API_KEY }}
  LASTFM_SECRET: ${{ secrets.LASTFM_SECRET }}
  SPOTIFY_CLIENT_ID: ${{ secrets.SPOTIFY_CLIENT_ID }}
  SPOTIFY_REDIRECT_URI: ${{ secrets.SPOTIFY_REDIRECT_URI }}

jobs:
  check-version:
    if: contains(github.ref, 'refs/tags') == false
    runs-on: ubuntu-latest
    outputs:
      version_changed: ${{ steps.check_version.outputs.version_changed }}
      new_version: ${{ steps.check_version.outputs.new_version }}
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - name: Check if version changed
        id: check_version
        run: |
          if [ ! -f app/build.gradle.kts ]; then
            echo "File app/build.gradle.kts does not exist"
            echo "version_changed=false" >> $GITHUB_OUTPUT
            exit 0
          fi

          NEW_VERSION=$(grep -oP 'versionName\s*=\s*"\K[^"]+' app/build.gradle.kts || echo "")
          if [ -z "$NEW_VERSION" ]; then
            echo "Could not find versionName in app/build.gradle.kts"
            echo "version_changed=false" >> $GITHUB_OUTPUT
            exit 0
          fi

          OLD_VERSION=$(git diff HEAD^ HEAD -- app/build.gradle.kts | grep -oP 'versionName\s*=\s*"\K[^"]+' || echo "")

          if [ -z "$OLD_VERSION" ]; then
            echo "version_changed=true" >> $GITHUB_OUTPUT
            echo "new_version=$NEW_VERSION" >> $GITHUB_OUTPUT
          elif [ "$OLD_VERSION" != "$NEW_VERSION" ]; then
            echo "version_changed=true" >> $GITHUB_OUTPUT
            echo "new_version=$NEW_VERSION" >> $GITHUB_OUTPUT
          else
            echo "version_changed=false" >> $GITHUB_OUTPUT
          fi
      - name: Debug output
        run: |
          echo "version_changed: ${{ steps.check_version.outputs.version_changed }}"
          echo "new_version: ${{ steps.check_version.outputs.new_version }}"

  build:
    needs: check-version
    if: needs.check-version.outputs.version_changed == 'true' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    strategy:
      matrix:
        abi: [ 'arm64', 'armeabi', 'x86', 'x86_64', 'universal' ]

    steps:
      - uses: actions/checkout@v5
      
      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: 'temurin'
      
      - name: Set Up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          cache-cleanup: on-success
          
      - name: Grant execute permission for gradlew
        run: chmod +x gradlew
 
      - name: Build Release APK
        run: ./gradlew assemble${{ matrix.abi }}Release
        env:
          PULL_REQUEST: 'false'
          GITHUB_EVENT_NAME: ${{ github.event_name }}

      - name: Sign APK
        uses: ilharp/sign-android-release@v2.0.0
        with:
          releaseDir: app/build/outputs/apk/${{ matrix.abi }}/release/
          signingKey: ${{ secrets.KEYSTORE }}
          keyAlias: ${{ secrets.KEY_ALIAS }}
          keyStorePassword: ${{ secrets.KEYSTORE_PASSWORD }}
          keyPassword: ${{ secrets.KEY_PASSWORD }}
          buildToolsVersion: 35.0.0

      
      - name: Move and rename signed APKs
        run: |
          mkdir -p app/build/outputs/apk/${{ matrix.abi }}/release/out
          if [ "${{ matrix.abi }}" = "universal" ]; then
            find app/build/outputs/apk/${{ matrix.abi }}/release/ -name "*-signed.apk" -o -name "*-unsigned-signed.apk" | xargs -I{} mv {} app/build/outputs/apk/${{ matrix.abi }}/release/out/Resonix.apk
          else
            find app/build/outputs/apk/${{ matrix.abi }}/release/ -name "*-signed.apk" -o -name "*-unsigned-signed.apk" | xargs -I{} mv {} app/build/outputs/apk/${{ matrix.abi }}/release/out/app-${{ matrix.abi }}-release.apk
          fi
  
      - name: Upload Signed APKs
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.abi == 'universal' && 'Resonix' || format('app-{0}-release', matrix.abi) }}
          path: app/build/outputs/apk/${{ matrix.abi }}/release/out/${{ matrix.abi == 'universal' && 'Resonix.apk' || format('app-{0}-release.apk', matrix.abi) }}

  create-release:
    needs: [check-version, build]
    if: needs.check-version.outputs.version_changed == 'true' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v5
      
      - name: Resolve Version & Title
        id: resolve
        run: |
          VERSION="${{ needs.check-version.outputs.new_version }}"
          if [ -z "$VERSION" ]; then
            echo "Error: Version string is empty or malformed."
            exit 1
          fi
          
          # Parse Base and Suffix for Cinematic Title
          if [[ "$VERSION" == *"-"* ]]; then
            BASE=$(echo "$VERSION" | cut -d'-' -f1)
            SUFFIX=$(echo "$VERSION" | cut -d'-' -f2-)
            TITLE="Resonix v$BASE — $SUFFIX"
          else
            BASE="$VERSION"
            TITLE="Resonix v$VERSION"
          fi
          
          echo "title=$TITLE" >> $GITHUB_OUTPUT
          echo "base_version=$BASE" >> $GITHUB_OUTPUT
          
          # Prerelease tag check
          if echo "$VERSION" | grep -qiE '(alpha|beta|rc|dev)'; then
             echo "prerelease=true" >> $GITHUB_OUTPUT
          else
             echo "prerelease=false" >> $GITHUB_OUTPUT
          fi
          
      - name: Find Release Notes
        id: notes
        run: |
          BASE="${{ steps.resolve.outputs.base_version }}"
          # Search for markdown file dynamically using wildcard
          if [ ! -d "release-notes" ]; then
            echo "Error: release-notes/ directory is missing."
            exit 1
          fi
          
          NOTE_FILE=$(find release-notes/ -type f -iname "v${BASE}*.md" | head -n 1)
          
          if [ -z "$NOTE_FILE" ]; then
            echo "Error: No markdown release notes found for version $BASE in release-notes/"
            exit 1
          fi
          
          echo "Found release notes: $NOTE_FILE"
          echo "file_path=$NOTE_FILE" >> $GITHUB_OUTPUT

      - name: Download all APKs
        uses: actions/download-artifact@v4
        with:
          path: downloaded_artifacts/
          
      - name: Verify APKs
        run: |
          APK_COUNT=$(find downloaded_artifacts -name "*.apk" | wc -l)
          if [ "$APK_COUNT" -eq 0 ]; then
            echo "Error: No APK files found in downloaded_artifacts/ to attach to release."
            exit 1
          fi
          echo "Found $APK_COUNT APKs ready for release."
          
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.check-version.outputs.new_version }}
          name: ${{ steps.resolve.outputs.title }}
          body_path: ${{ steps.notes.outputs.file_path }}
          prerelease: ${{ steps.resolve.outputs.prerelease == 'true' }}
          files: downloaded_artifacts/**/*.apk
          fail_on_unmatched_files: true
